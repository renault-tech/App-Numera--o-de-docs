<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Sistema de reserva e numeração de documentos oficiais da Prefeitura de Cataguases">
    <meta name="theme-color" content="#eef1f7">
    <title>Numeração de Documentos — Prefeitura de Cataguases</title>
    <link rel="icon" type="image/png" href="logo.png">
    <!-- Instalável como app (Add to Home Screen) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Numeração">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json?v=202607211900">
    <link rel="stylesheet" href="styles.css?v=202607211900">
</head>

<body>
    <div id="app-root"></div>

    <div id="debug-error-container"
        style="display:none; color:#b91c1c; padding:16px; background:#fff; border:1px solid #f3c2c2; margin:16px; border-radius:12px; font-family:monospace; white-space:pre-wrap;"></div>
    <script>
        window.onerror = function (msg, url, lineNo) {
            var c = document.getElementById('debug-error-container');
            if (c) { c.style.display = 'block'; c.textContent += 'Erro: ' + msg + ' (linha ' + lineNo + ')\n'; }
            return false;
        };
        function resetAppData() {
            if (confirm('Resetar dados locais do aplicativo?')) { localStorage.clear(); location.reload(); }
        }
        window.resetAppData = resetAppData;
    </script>

    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <!-- Bibliotecas de exportação (jsPDF/XLSX/SheetJS) são carregadas SOB DEMANDA
         pelo app.js (loadScriptOnce) no primeiro clique de exportar. -->

    <script src="auth-service.js?v=202607211900"></script>
    <script src="app.js?v=202607211900"></script>
</body>

</html>
